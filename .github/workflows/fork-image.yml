name: Publish fork image

on:
  push:
    branches:
      - main
    tags:
      - 'fork-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: fork-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  verify:
    if: github.repository == 'manyou116/new-api'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare embedded frontend assets
        run: |
          mkdir -p web/default/dist web/classic/dist
          touch web/default/dist/index.html web/classic/dist/index.html

      - name: Test
        run: go test ./...

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/fork-v') }}

      # amd64-only: drop QEMU multi-arch (was ~20min). Single native platform.
      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fork-image-amd64
          cache-to: type=gha,mode=max,scope=fork-image-amd64
          provenance: false
          sbom: false

      - name: Attest image provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish summary
        run: |
          echo '### Published fork image (linux/amd64)' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ env.IMAGE }}@${{ steps.build.outputs.digest }}' >> "$GITHUB_STEP_SUMMARY"
